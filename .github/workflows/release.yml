name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG_FILE="src/data/changelog/${VERSION}.json"

          NOTES=$(node -e "
          const fs = require('fs');
          const file = process.argv[1];
          if (!fs.existsSync(file)) {
            console.log('See commit history for changes.');
            process.exit(0);
          }
          const e = JSON.parse(fs.readFileSync(file, 'utf8'));
          const lines = [];
          if (e.highlight) { lines.push(e.highlight); lines.push(''); }
          if (e.new_countries?.length) {
            lines.push('### New Countries');
            e.new_countries.forEach(c => lines.push('- ' + c.name));
            lines.push('');
          }
          if (e.new_variants?.length) {
            lines.push('### New Expat Variants');
            e.new_variants.forEach(v => lines.push('- ' + v.country + ' \u2014 ' + v.label));
            lines.push('');
          }
          if (e.new_year_data?.length) {
            lines.push('### Tax Year Data');
            e.new_year_data.forEach(yd => lines.push('- ' + yd.year + ': ' + yd.countries.map(c => c.name).join(', ')));
            lines.push('');
          }
          if (e.improvements?.length) {
            lines.push('### Improvements');
            e.improvements.forEach(i => lines.push('- ' + i));
            lines.push('');
          }
          if (e.fixes?.length) {
            lines.push('### Fixes');
            e.fixes.forEach(f => lines.push('- ' + f));
          }
          console.log(lines.join('\n').trimEnd());
          " "$CHANGELOG_FILE")

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "**Production:** https://universal-net-calc.reconnct.workers.dev"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $GITHUB_REF_NAME" \
            --notes "${{ steps.release-notes.outputs.notes }}"
